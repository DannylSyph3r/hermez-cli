name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            npm-pkg: cli-linux-x64
            binary: hermez
            use-cross: true

          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            npm-pkg: cli-linux-arm64
            binary: hermez
            use-cross: true

          - name: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
            npm-pkg: cli-darwin-x64
            binary: hermez
            use-cross: false

          - name: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            npm-pkg: cli-darwin-arm64
            binary: hermez
            use-cross: false

          - name: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            npm-pkg: cli-win32-x64
            binary: hermez.exe
            use-cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Rename binary for upload
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="hermez-${{ matrix.name }}"
          if [ "${{ matrix.name }}" = "win32-x64" ]; then
            dst="${dst}.exe"
          fi
          cp "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: hermez-${{ matrix.name }}*
          if-no-files-found: error

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Copy binaries into npm platform packages
        shell: bash
        run: |
          declare -A PLATFORMS=(
            [linux-x64]="cli-linux-x64:hermez"
            [linux-arm64]="cli-linux-arm64:hermez"
            [darwin-x64]="cli-darwin-x64:hermez"
            [darwin-arm64]="cli-darwin-arm64:hermez"
            [win32-x64]="cli-win32-x64:hermez.exe"
          )

          for artifact in "${!PLATFORMS[@]}"; do
            IFS=':' read -r pkg binary <<< "${PLATFORMS[$artifact]}"
            dest="npm/${pkg}/bin"
            mkdir -p "$dest"
            cp "artifacts/${artifact}/hermez-${artifact}"* "${dest}/${binary}"
            chmod +x "${dest}/${binary}"
          done

      - name: Update package versions
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update main package and all platform packages
          for pkg_dir in npm npm/cli-linux-x64 npm/cli-linux-arm64 npm/cli-darwin-x64 npm/cli-darwin-arm64 npm/cli-win32-x64; do
            tmp=$(mktemp)
            jq --arg v "$VERSION" '.version = $v | if .optionalDependencies then .optionalDependencies |= with_entries(.value = $v) else . end' \
              "${pkg_dir}/package.json" > "$tmp"
            mv "$tmp" "${pkg_dir}/package.json"
          done

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in cli-linux-x64 cli-linux-arm64 cli-darwin-x64 cli-darwin-arm64 cli-win32-x64; do
            cd "npm/${pkg}"
            npm publish --access public --provenance
            cd ../..
          done

      - name: Publish main package
        working-directory: npm/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux-x64/hermez-linux-x64
            artifacts/linux-arm64/hermez-linux-arm64
            artifacts/darwin-x64/hermez-darwin-x64
            artifacts/darwin-arm64/hermez-darwin-arm64
            artifacts/win32-x64/hermez-win32-x64.exe
